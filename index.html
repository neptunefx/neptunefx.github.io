<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neptune Archive</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="shell">

    <header class="topbar">
        <div class="brand">
            <span class="brand-title">NEPTUNE</span>
            <span class="brand-sub">Editing Tools Archive</span>
        </div>
    </header>

    <div class="landing-intro">
        <h1>Browse the archive</h1>
        <p>Tools, sound effects, and a few useful links.</p>
    </div>

    <div class="box-grid">
        <a class="box-card" href="tools.html">
            <div class="box-label">Tools</div>
            <div class="box-desc">Editing tools, presets, and plugins.</div>
            <div class="box-count" id="toolsCount"></div>
        </a>

        <a class="box-card" href="sfx.html">
            <div class="box-label">SFX</div>
            <div class="box-desc">Anime and general sound effects.</div>
            <div class="box-count" id="sfxCount"></div>
        </a>

        <a class="box-card" href="links.html">
            <div class="box-label">Useful Links</div>
            <div class="box-desc">A small collection of helpful resources.</div>
        </a>
    </div>

    <footer>
        <div>Neptune Archive &mdash; Built for creators</div>
        <div>Made by Ko</div>
    </footer>

</div>

<script>
    fetch("./data.json")
        .then(res => res.json())
        .then(data => {
            const isSfx = c => c.startsWith("SFX") || c === "Anime SFX";
            const sfxCount = data.filter(i => isSfx(i.category)).length;
            const toolsCount = data.length - sfxCount;
            document.getElementById("toolsCount").textContent = `${toolsCount} item${toolsCount === 1 ? "" : "s"}`;
            document.getElementById("sfxCount").textContent = `${sfxCount} item${sfxCount === 1 ? "" : "s"}`;
        })
        .catch(() => {});
</script>
</body>
</html>
