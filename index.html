<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2255%22 font-size=%2280%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>🔵</text></svg>">
    <title>Neptune Archive</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div id="introLoader" class="intro-loader">
    <div class="intro-text">ENTERING NEPTUNE</div>
    <div class="intro-bar"><div class="intro-bar-fill"></div></div>
</div>

<div class="bg"></div>
<canvas id="stars"></canvas>
<div id="cursorGlow" class="cursor-glow"></div>
<div id="parallaxPlanets" class="parallax-planets"></div>

<div id="planetTracker" class="planet-tracker">
    <div id="planetRail" class="planet-rail"></div>
</div>

<button id="scrollTop" class="scroll-top" title="Back to the Sun">↑</button>

<div class="shell">

    <header class="topbar">
        <div class="brand" id="brandLogo">
            <span class="brand-icon">🔵</span>
            <div>
                <div class="brand-title">NEPTUNE</div>
                <div class="brand-sub">Editing Tools Archive <span id="liveCount" class="live-count"></span></div>
            </div>
        </div>

        <div class="search-wrap">
            <input id="search" placeholder="Search tools, presets, plugins...">
        </div>
    </header>

    <div class="layout">

        <aside class="sidebar">
            <div class="sidebar-title">Categories</div>
            <div id="categoryList" class="category-list">
                <button class="cat-btn active" data-cat="all">
                    <span>All</span><span class="count" id="countAll">0</span>
                </button>
            </div>
        </aside>

        <main class="content">
            <div class="content-header">
                <h2 id="sectionTitle">All Tools</h2>
                <span id="resultCount" class="result-count"></span>
            </div>

            <div id="grid" class="grid"></div>
            <div id="emptyState" class="empty-state" style="display:none;">
                No results found.
            </div>

            <section class="links-section">
                <h2 class="links-title">Other Useful Links</h2>
                <div class="links-grid">
                    <a href="https://fmhy.net/downloading#software-sites" target="_blank" rel="noopener">FMHY — Software Sites</a>
                    <a href="https://fmhy.net/video-tools#vfx-sites" target="_blank" rel="noopener">FMHY — VFX Sites</a>
                    <a href="https://codec.kyiv.ua/ad0be.html" target="_blank" rel="noopener">Codec Kyiv — Adobe</a>
                    <a href="https://macserialjunkie.com/forum/" target="_blank" rel="noopener">Mac Serial Junkie</a>
                    <a href="https://audioz.download/" target="_blank" rel="noopener">AudioZ</a>
                    <a href="https://w18.monkrus.ws/" target="_blank" rel="noopener">Monkrus</a>
                    <a href="https://macked.app/" target="_blank" rel="noopener">Macked</a>
                    <a href="https://appstorrent.ru/" target="_blank" rel="noopener">AppsTorrent</a>
                    <a href="https://macbb.org/" target="_blank" rel="noopener">MacBB</a>
                    <a href="https://fmhy.net/" target="_blank" rel="noopener">FMHY — Home</a>
                </div>
            </section>
        </main>

    </div>

    <footer>
        <div>neptune archive — built for creators</div>
        <div class="made-by">made by ko</div>
        <div class="rip-line">rip 🪐</div>
    </footer>

</div>

<script src="app.js"></script>
</body>
</html>
