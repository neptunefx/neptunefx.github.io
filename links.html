<div class="shell">

    <header class="topbar">
        <div class="brand">
            <a class="brand-title" href="index.html">NEPTUNE</a>
            <span class="brand-sub">Editing Tools Archive</span>
        </div>
        <nav class="toplinks">
            <a href="tools.html">Tools</a>

    <div class="landing-intro">
        <h1>Useful Links</h1>
        <p>A small hand-picked list of resources. Edit this page directly to add or remove links.</p>

    <!--
        To add a link, copy one <a> block inside .links-list and edit it.
        To add a new group, copy a whole .links-group block.
    -->

    <div class="links-group">
        <h3>Example Group</h3>
        <div class="links-list">
            <a href="https://example.com" target="_blank" rel="noopener">
                Example Link Name
                <span class="link-desc">One-line description of what this is.</span>
            </a>
        </div>
    </div>

    <footer>
        <div>Neptune Archive &mdash; Built for creators</div>

</div>
